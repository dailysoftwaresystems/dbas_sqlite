name: dbas_sqlite_flutter
description: "Flutter plugin that access SQLite for Android, iOS, macOS, Linux, Windows and Web."
version: 1.6.2
homepage: https://github.com/dailysoftwaresystems/DBAS.SQLite.Flutter

environment:
  sdk: ^3.8.1
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.0
  path: ^1.9.1
  decimal: ^3.2.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      web:
        pluginClass: DbasSqliteNativeWeb
        fileName: src/native/dbas_sqlite_native_web.dart
  assets:
    - web/libs/dbas_sqlite.js
