name: Test Flutter Plugin
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: write
  packages: write
jobs:
  test:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
      with:
        path: ${{github.workspace}}
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        channel: 'stable'
    - name: Auto set package version from pubspec.yaml
      run: |
        version=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
        echo "Building version: $version"
        echo "VERSION=$version" >> $GITHUB_ENV
    - name: Get Flutter dependencies
      run: flutter pub get
    - name: Analyze code
      run: flutter analyze
    - name: Run Flutter tests
      run: flutter test
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ env.VERSION }}
        tag_name: ${{ env.VERSION }}
        body: Release ${{ env.VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Login to GitHub Container Registry
      run: docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GITHUB_TOKEN }}
    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Tag GitHub Container Docker Image
      run: |
          docker tag dbas_sqlite:latest ghcr.io/${{ github.repository_owner }}/dbas_sqlite:latest
          docker tag dbas_sqlite:latest ghcr.io/${{ github.repository_owner }}/dbas_sqlite:${{ env.VERSION }}
    - name: Push GitHub Container Docker Image
      run: |
          docker push ghcr.io/${{ github.repository_owner }}/dbas_sqlite:latest
          docker push ghcr.io/${{ github.repository_owner }}/dbas_sqlite:${{ env.VERSION }}
    - name: Tag Docker Image
      run: |
          docker tag dbas_sqlite:latest ${{ github.repository_owner }}/dbas_sqlite:latest
          docker tag dbas_sqlite:latest ${{ github.repository_owner }}/dbas_sqlite:${{ env.VERSION }}
    - name: Push Docker Image
      run: |
          docker push ${{ github.repository_owner }}/dbas_sqlite:latest
          docker push ${{ github.repository_owner }}/dbas_sqlite:${{ env.VERSION }}
