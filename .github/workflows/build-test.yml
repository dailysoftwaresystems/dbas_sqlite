name: Build and Test Flutter Plugin
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.41.4'
    - name: Auto set package version from pubspec.yaml
      run: |
        version=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
        echo "Building version: $version"
        echo "VERSION=$version" >> $GITHUB_ENV
    - name: Get Flutter dependencies
      run: flutter pub get
    - name: Get example dependencies
      working-directory: example
      run: flutter pub get
    - name: Analyze code
      run: flutter analyze
    - name: Run native tests
      run: flutter test test/
    - name: Start ChromeDriver
      run: |
        chromedriver --port=4444 &
        echo "CHROMEDRIVER_PID=$!" >> $GITHUB_ENV
    - name: Run web integration tests
      working-directory: example
      timeout-minutes: 10
      run: |
        flutter drive \
          --driver=test_driver/integration_test.dart \
          --target=integration_test/dbas_sqlite_web_test.dart \
          -d web-server \
          --browser-name=chrome
    - name: Stop ChromeDriver
      if: always()
      run: kill $CHROMEDRIVER_PID || true
    - name: Create Release
      if: github.event_name == 'push'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ env.VERSION }}" > /dev/null 2>&1; then
          echo "Release ${{ env.VERSION }} already exists, skipping."
        else
          gh release create "${{ env.VERSION }}" \
            --title "Release ${{ env.VERSION }}" \
            --notes "Release ${{ env.VERSION }}"
        fi
